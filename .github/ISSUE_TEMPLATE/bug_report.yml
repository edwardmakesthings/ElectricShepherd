name: Bug report
description: Report a reproducible problem in Electric Shepherd
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please provide a minimal reproducible case.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Include exact commands and inputs.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior / output
      description: Paste relevant logs or errors.
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Node version, OpenCode version, and relevant env vars (redact secrets).
      placeholder: |
        - OS:
        - Node:
        - OpenCode:
        - MemPalace MCP setup:
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues.
          required: true
        - label: I removed/redacted secrets and private hostnames from logs.
          required: true
